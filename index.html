<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monoculo AR</title>

  <script src="https://unpkg.com/mind-ar@1.2.2/dist/mindar-image-three.prod.js"></script>
  <script src="https://unpkg.com/three@0.150.1/build/three.min.js"></script>

  <style>
    body { margin: 0; overflow: hidden; }
  </style>
</head>
<body>

<script>
document.addEventListener("DOMContentLoaded", async () => {

  const mindarThree = new window.MINDAR.IMAGE.MindARThree({
    container: document.body,
    imageTargetSrc: "targets.mind",
  });

  const { renderer, scene, camera } = mindarThree;
  const anchor = mindarThree.addAnchor(0);

  const geometry = new THREE.TorusGeometry(0.6, 0.1, 32, 200);
  const material = new THREE.MeshStandardMaterial({ color: 0xd4af37 });
  const monoculo = new THREE.Mesh(geometry, material);

  monoculo.rotation.x = Math.PI / 2;
  anchor.group.add(monoculo);

  const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1);
  scene.add(light);

  await mindarThree.start();
  renderer.setAnimationLoop(() => {
    renderer.render(scene, camera);
  });

});
</script>

</body>
</html>
